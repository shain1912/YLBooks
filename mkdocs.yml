site_name: 바이브코딩으로 만드는 내 키링 게임기
site_description: AI 페어 코딩으로 PCB 키링에 펌웨어 올리고 리듬게임까지 만드는 22장 DIY 교재
site_author: YLBook
docs_dir: docs

theme:
  name: material
  language: ko
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/weather-night
        name: 라이트 모드

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 시작: index.md
  - 1부 바이브코딩 첫걸음:
      - 1장 왜 바이브코딩인가: ch01.md
      - 2장 Claude Code 설치하고 길들이기: ch02.md
      - 3장 Antigravity로 시각적으로 코딩하기: ch03.md
  - 2부 키링이 살아나는 순간:
      - 4장 키링 보드 처음 만나기: ch04.md
      - 5장 Arduino IDE 설정과 첫 업로드: ch05.md
      - 6장 버튼 하나로 키보드 흉내내기: ch06.md
      - 7장 채터링과의 전쟁(디바운싱): ch07.md
      - 8장 4버튼 키링 완성: ch08.md
  - 3부 내 손으로 만드는 리듬게임:
      - 9장 pygame 설치와 첫 창 띄우기: ch09.md
      - 10장 노트가 떨어지는 화면 만들기: ch10.md
      - 11장 차트 파일과 음악 동기화: ch11.md
      - 12장 키링으로 노트 치기 (판정 시스템): ch12.md
      - 13장 캘리브레이션과 지연 보정: ch13.md
      - 14장 내 노래로 차트 만들기: ch14.md
      - 15장 게임 꾸미기와 발표 시연 모드: ch15.md
  - 4부 조이스틱으로 확장:
      - 16장 조이스틱 핀맵과 데드존 처리: ch16.md
      - 17장 게임패드 모드로 변신: ch17.md
      - 18장 조이스틱으로 우주선 슈팅: ch18.md
      - 19장 한 단계 더, 적과 폭발 효과: ch19.md
  - 5부 마무리와 자랑:
      - 20장 키링 케이스와 마감: ch20.md
      - 21장 깃허브에 공개하고 README 쓰기: ch21.md
      - 22장 발표·다음 단계 로드맵: ch22.md
